name: Validate and Publish OpenAPI Contracts

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**/openapi.yaml'
      - '**/openapi.yml'
      - 'contracts/**/*.yaml'
      - 'contracts/**/*.yml'
  push:
    branches:
      - main
    paths:
      - '**/openapi.yaml'
      - '**/openapi.yml'
      - 'contracts/**/*.yaml'
      - 'contracts/**/*.yml'

jobs:
  validate:
    name: Validate OpenAPI Specs
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js (para Redocly CLI)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install Redocly CLI
      - name: Install Redocly CLI
        run: npm install -g @redocly/cli@latest

      # 4. Validate with Redocly
      - name: Redocly Lint
        run: |
          echo "🔍 Running Redocly validation..."
          npx @redocly/cli lint "contracts/**/*.yaml" --format=stylish

      # 5. Validate with Spectral
      - name: Spectral Lint
        run: |
          echo "🔍 Running Spectral validation..."
          npx @stoplight/spectral-cli lint "contracts/**/*.yaml"
